consumer {
  bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}
  group-id = "scala-batch-orders-consumer"
  auto-offset-reset = "earliest"
  enable-auto-commit = false
  key-deserializer = "org.apache.kafka.common.serialization.StringDeserializer"
  value-deserializer = "org.apache.kafka.common.serialization.StringDeserializer"
  poll-timeout-ms = 1000
}

producer {
  bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}
  key-serializer = "org.apache.kafka.common.serialization.StringSerializer"
  value-serializer = "org.apache.kafka.common.serialization.StringSerializer"
}

topics {
  input = "orders-validated"
  report-output = "daily_report"
}

mongo {
  uri = ${?MONGO_URI}
  database = ${?DATABASE_NAME}
  orders-collection = ${?BATCH_ORDERS_COLLECTION}
  reports-collection = ${?BATCH_REPORTS_COLLECTION}
}

spark {
  app-name = "ScalaBatchDailyReport"
  master = "local[*]"
  checkpoint-base-path = "/tmp/scalabatch-checkpoints"
}

batch {
  interval-minutes = 5
  interval-minutes = ${?BATCH_INTERVAL_MINUTES}
}
