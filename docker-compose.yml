services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    networks:
      - kafka_net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep Mode"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    networks:
      - kafka_net
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.0
    networks:
      - kafka_net
    ports:
      - "8088:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: 'true'

  mongo:
    image: mongo:7
    networks:
      - kafka_net
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${DATABASE_NAME}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    networks:
      - kafka_net
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders-validated --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic orders-validation-metrics --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic daily_report --partitions 1 --replication-factor 1

  ecommerce:
    build: ./ScalaEcommerce
    networks:
      - kafka_net
    ports:
      - "9000:9000"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APPLICATION_SECRET: "scala-ecommerce-secret-docker-compose-2024-secure"

  streaming:
    build: ./ScalaStreaming
    networks:
      - kafka_net
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  scalabatch:
    build: ./ScalaBatch
    networks:
      - kafka_net
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: ./ScalaBatch/.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  scalaapi:
    build: ./ScalaAPI
    networks:
      - kafka_net
    ports:
      - "9100:9100"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APPLICATION_SECRET: "scala-api-secret-docker-compose-2026"

  notification:
    build: ./ScalaNotificationService
    networks:
      - kafka_net
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      METRICS_TOPIC: orders-validation-metrics
      DAILY_REPORT_TOPIC: daily_report
      NOTIFICATION_GROUP_ID: scala-notification-service

  frontend:
    build: ./ScalaParkFrontend
    networks:
      - kafka_net
    ports:
      - "5173:80"
    depends_on:
      - scalaapi

volumes:
  kafka_data:
  mongo_data:

networks:
  kafka_net:
    driver: bridge
